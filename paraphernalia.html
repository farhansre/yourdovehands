<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paraphernalia — Your Dove Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --beige: #e6ddca;
      --beige-deep: #ded4bd;
      --dove: #faf7ef;
      --dove-dim: rgba(250, 247, 239, 0.62);
      --serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--serif);
      color: var(--dove);
      background: radial-gradient(120% 90% at 50% 30%, var(--beige) 0%, var(--beige-deep) 100%);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12vh 6vw;
    }
    .home {
      position: fixed;
      top: clamp(16px, 3vh, 26px);
      left: clamp(18px, 4vw, 34px);
      z-index: 10;
      font-size: clamp(13px, 1.8vw, 16px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--dove-dim);
      padding-left: 0.32em;
      transition: color 0.3s ease, letter-spacing 0.4s ease;
    }
    .home::before { content: "\2190"; margin-right: 0.7em; letter-spacing: 0; }
    .home:hover, .home:focus-visible { color: var(--dove); letter-spacing: 0.38em; outline: none; }

    .content { max-width: 760px; }
    .page-title {
      font-weight: 300;
      font-size: clamp(28px, 5.6vw, 58px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin: 0 0 clamp(20px, 5vh, 40px);
      padding-left: 0.3em;
      text-shadow: 0 1px 0 rgba(60, 50, 38, 0.14);
    }
    .tba {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(22px, 4.4vw, 40px);
      letter-spacing: 0.12em;
      opacity: 0.9;
      margin: 0;
    }
    .sub {
      margin-top: 18px;
      font-size: clamp(14px, 2.2vw, 19px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dove-dim);
    }
    .footer {
      position: fixed;
      left: 50%;
      bottom: clamp(16px, 3vh, 30px);
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: clamp(20px, 5vw, 46px);
      font-size: clamp(12px, 1.7vw, 15px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
    .footer a {
      text-decoration: none;
      color: var(--dove-dim);
      padding-left: 0.28em;
      transition: color 0.3s ease;
    }
    .footer a:hover, .footer a:focus-visible { color: var(--dove); outline: none; }
  </style>
</head>
<body>
  <a href="index.html" class="home">Home</a>

  <div class="content">
    <h1 class="page-title">Paraphernalia</h1>
    <p class="tba">Nothing on the shelf yet.</p>
    <p class="sub">Wares to be announced</p>
  </div>

  <footer class="footer">
    <a href="https://yourdovehands.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
    <a href="mailto:yourdovehands@gmail.com">Email</a>
  </footer>
</body>
</html>
