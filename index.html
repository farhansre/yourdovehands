<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Dove Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Shantell+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --beige: #d3c39f;
      --beige-deep: #c1af86;
      --dove: #f7f1e2;          /* soft white */
      --dove-dim: rgba(247, 241, 226, 0.6);
      --ink: #2f2718;
      --soft: "Shantell Sans", "Comic Sans MS", cursive, sans-serif;
      --hand: "Caveat", "Shantell Sans", cursive;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background-color: var(--beige);
      color: var(--dove);
      font-family: var(--soft);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* speckled paper grain so nothing looks too clean */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
    }

    /* ---------- MENU (beige) ---------- */
    .menu {
      position: fixed;
      inset: 0;
      z-index: 2;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7vh 6vw 15vh;
      background: radial-gradient(130% 100% at 48% 26%, var(--beige) 0%, var(--beige-deep) 100%);
      opacity: 0;
      transition: opacity 1.1s ease 0.15s;
    }
    /* faded band collage as paper texture behind the menu (shows nothing if the file isn't there yet) */
    .menu::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: url("poster-collage.jpg") center / cover no-repeat;
      opacity: 0.12;
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .menu.revealed { opacity: 1; }

    /* handwritten logo used as the wordmark; white background drops out via multiply */
    .wordmark-img {
      width: clamp(230px, 48vw, 540px);
      height: auto;
      margin: 0 0 clamp(20px, 4.5vh, 46px);
      mix-blend-mode: multiply;
      transform: rotate(-2deg);
      filter: contrast(1.06);
      user-select: none;
    }

    .emblem {
      width: clamp(74px, 11vw, 122px);
      height: auto;
      margin-bottom: clamp(10px, 2.4vh, 24px);
      opacity: 0.9;
      transform: rotate(-4deg);
      filter: drop-shadow(0 3px 5px rgba(47, 39, 24, 0.18));
      user-select: none;
      pointer-events: none;
    }

    .wordmark {
      margin: 0 0 clamp(24px, 5vh, 50px);
      font-family: var(--soft);
      font-weight: 600;
      font-size: clamp(34px, 7vw, 68px);
      letter-spacing: 0.01em;
      color: var(--dove);
      text-shadow: 1px 2px 0 rgba(47, 39, 24, 0.16);
      line-height: 0.98;
      transform: rotate(-2.2deg);
    }
    .wordmark .l2 { display: block; margin-left: 0.5em; transform: rotate(1.4deg); }

    .menu-dove {
      position: absolute;
      width: clamp(84px, 13vw, 168px);
      left: clamp(12px, 5vw, 72px);
      bottom: clamp(56px, 12vh, 128px);
      opacity: 0.55;
      transform: rotate(-8deg);
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(47, 39, 24, 0.2));
      animation: drift 9s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-14px) rotate(-4deg); }
    }

    nav.links {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1.8vh, 16px);
      align-items: center;
    }

    nav.links a {
      font-family: var(--soft);
      font-size: clamp(22px, 3.6vw, 35px);
      font-weight: 500;
      text-decoration: none;
      color: var(--dove);
      text-shadow: 1px 1px 0 rgba(47, 39, 24, 0.14);
      padding: 2px 8px;
      transition: color 0.25s ease, transform 0.25s ease;
    }
    nav.links a:nth-child(1) { transform: rotate(-1.6deg); }
    nav.links a:nth-child(2) { transform: rotate(1.3deg); }
    nav.links a:nth-child(3) { transform: rotate(-0.8deg); }
    nav.links a:nth-child(4) { transform: rotate(1.8deg); }

    nav.links a:hover,
    nav.links a:focus-visible {
      color: #fffdf5;
      text-decoration: underline;
      text-decoration-style: wavy;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 5px;
      transform: rotate(0deg) scale(1.04);
      outline: none;
    }

    /* ---------- TITLE OVERLAY (black) ---------- */
    .title {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.9s ease;
    }
    .title.hide { opacity: 0; pointer-events: none; }

    .enter {
      appearance: none; -webkit-appearance: none;
      border: 0; background: transparent; padding: 0; margin: 0;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: min(72vmin, 560px);
      position: relative;
    }
    .enter:focus { outline: none; }

    .ring-still {
      width: 100%; height: auto; display: block;
      transition: opacity 0.4s ease;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50% { transform: scale(1.035) rotate(1deg); }
    }

    .ring-clip {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0; transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .enter.playing .ring-still { opacity: 0; }
    .enter.playing .ring-clip { opacity: 1; }

    .enter-hint {
      margin-top: 20px;
      font-family: var(--hand);
      font-weight: 600;
      font-size: clamp(22px, 3.4vw, 34px);
      letter-spacing: 0.02em;
      color: rgba(247, 241, 226, 0.72);
      transform: rotate(-3deg);
      transition: opacity 0.5s ease;
      animation: pulse 3.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.9; } }
    .enter.playing .enter-hint { opacity: 0; }

    /* ---------- FOOTER (always present) ---------- */
    .footer {
      position: fixed;
      left: 50%; bottom: clamp(16px, 3vh, 30px);
      transform: translateX(-50%) rotate(-1deg);
      z-index: 20;
      display: flex; gap: clamp(20px, 5vw, 44px);
      font-family: var(--hand);
      font-weight: 600;
      font-size: clamp(17px, 2.2vw, 22px);
    }
    .footer a {
      text-decoration: none;
      color: var(--dove-dim);
      transition: color 0.25s ease, transform 0.25s ease;
    }
    .footer a:nth-child(2) { transform: rotate(2deg); }
    .footer a:hover, .footer a:focus-visible { color: var(--dove); outline: none; }
    body.title-up .footer a { color: rgba(247, 241, 226, 0.55); }
    body.title-up .footer a:hover { color: #fff; }

    @media (prefers-reduced-motion: reduce) {
      .ring-still { animation: none; }
      .enter-hint { animation: none; opacity: 0.75; }
      .menu, .title { transition: opacity 0.3s ease; }
    }
  </style>
</head>
<body class="title-up">

  <div class="grain"></div>

  <!-- MENU -->
  <main class="menu" id="menu" aria-hidden="true">
    <img class="emblem" src="emblem.png" alt="" />
    <img class="menu-dove" src="dove.png" alt="" />
    <img class="wordmark-img" src="logo-handwritten.png" alt="Your Dove Hands"
         onerror="this.style.display='none';var t=document.getElementById('wordmark-text');if(t){t.style.display='block';}" />
    <h1 class="wordmark" id="wordmark-text" style="display:none">Your Dove<span class="l2">Hands</span></h1>
    <nav class="links">
      <a href="live.html">Live</a>
      <a href="demos.html">Demos</a>
      <a href="paraphernalia.html">Paraphernalia</a>
      <a href="moving-pictures.html">Moving Pictures</a>
    </nav>
  </main>

  <!-- TITLE OVERLAY -->
  <div class="title" id="title">
    <button class="enter" id="enter" aria-label="Enter Your Dove Hands">
      <img class="ring-still" src="poster.png" alt="Your Dove Hands — a ring of doves" />
      <video class="ring-clip" id="clip" src="animation.mp4" muted playsinline preload="auto"></video>
      <span class="enter-hint">come in</span>
    </button>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="https://yourdovehands.bandcamp.com/" target="_blank" rel="noopener">bandcamp</a>
    <a href="mailto:yourdovehands@gmail.com">email</a>
  </footer>

  <script>
    (function () {
      var title = document.getElementById('title');
      var enter = document.getElementById('enter');
      var clip  = document.getElementById('clip');
      var menu  = document.getElementById('menu');
      var body  = document.body;
      var done  = false;
      var reduce = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function revealMenu() {
        if (done) return;
        done = true;
        title.classList.add('hide');
        body.classList.remove('title-up');
        menu.classList.add('revealed');
        menu.setAttribute('aria-hidden', 'false');
        setTimeout(function () { title.style.display = 'none'; }, 950);
      }
      function go() {
        if (enter.classList.contains('playing')) return;
        if (reduce) { revealMenu(); return; }
        enter.classList.add('playing');
        clip.addEventListener('ended', revealMenu, { once: true });
        var fallback = setTimeout(revealMenu, 1600);
        clip.addEventListener('ended', function () { clearTimeout(fallback); }, { once: true });
        var p = clip.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function () { clearTimeout(fallback); revealMenu(); });
        }
      }
      enter.addEventListener('click', go);
    })();
  </script>
</body>
</html>
