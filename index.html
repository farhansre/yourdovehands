<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Dove Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --beige: #c7b489;
      --beige-deep: #b7a473;
      --dove: #f7f1e2;
      --dove-dim: rgba(247, 241, 226, 0.65);
      --sans: "Rubik", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background-color: var(--beige);
      color: var(--dove);
      font-family: var(--sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ---------- MENU (beige) ---------- */
    .menu {
      position: fixed;
      inset: 0;
      z-index: 2;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7vh 6vw 15vh;
      background: radial-gradient(130% 100% at 50% 30%, var(--beige) 0%, var(--beige-deep) 100%);
      opacity: 0;
      transition: opacity 1s ease 0.1s;
    }
    .menu::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: url("poster-collage.jpg") center / cover no-repeat;
      opacity: 0.1;
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .menu.revealed { opacity: 1; }

    .to-title {
      position: fixed;
      top: clamp(16px, 3vh, 26px);
      left: clamp(18px, 4vw, 34px);
      z-index: 6;
      font-size: clamp(13px, 1.7vw, 15px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--dove-dim);
      transition: color 0.2s ease;
    }
    .to-title:hover, .to-title:focus-visible { color: var(--dove); outline: none; }

    .emblem {
      width: clamp(66px, 9.5vw, 104px);
      height: auto;
      margin-bottom: clamp(12px, 2.6vh, 26px);
      opacity: 0.9;
      user-select: none;
      pointer-events: none;
    }

    .menu-dove {
      position: absolute;
      width: clamp(72px, 11vw, 140px);
      left: clamp(14px, 6vw, 84px);
      bottom: clamp(64px, 13vh, 140px);
      opacity: 0.5;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .wordmark-img {
      width: clamp(220px, 46vw, 500px);
      height: auto;
      margin: 0 0 clamp(22px, 5vh, 48px);
      mix-blend-mode: multiply;
      user-select: none;
    }
    .wordmark {
      margin: 0 0 clamp(22px, 5vh, 48px);
      font-weight: 500;
      font-size: clamp(30px, 6vw, 58px);
      letter-spacing: 0.02em;
      color: var(--dove);
      line-height: 1.05;
    }

    nav.links {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.9vh, 18px);
      align-items: center;
    }
    nav.links a {
      font-size: clamp(19px, 2.9vw, 27px);
      font-weight: 400;
      letter-spacing: 0.01em;
      text-decoration: none;
      color: var(--dove);
      opacity: 0.9;
      padding: 2px 4px;
      transition: opacity 0.2s ease;
    }
    nav.links a:hover,
    nav.links a:focus-visible {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 5px;
      text-decoration-thickness: 1px;
      outline: none;
    }

    /* ---------- TITLE OVERLAY (black) ---------- */
    .title {
      position: fixed; inset: 0; z-index: 10; background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    .title.hide { opacity: 0; pointer-events: none; }

    .enter {
      appearance: none; -webkit-appearance: none;
      border: 0; background: transparent; padding: 0; margin: 0;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: min(72vmin, 560px); position: relative;
    }
    .enter:focus { outline: none; }

    .ring-still {
      width: 100%; height: auto; display: block;
      transition: opacity 0.4s ease;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .ring-clip {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
    }
    .enter.playing .ring-still { opacity: 0; }
    .enter.playing .ring-clip { opacity: 1; }

    .enter-hint {
      margin-top: 22px;
      font-weight: 400;
      font-size: clamp(13px, 1.7vw, 15px);
      letter-spacing: 0.42em;
      padding-left: 0.42em;
      text-transform: uppercase;
      color: rgba(247, 241, 226, 0.62);
      transition: opacity 0.5s ease;
      animation: pulse 3.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.85; } }
    .enter.playing .enter-hint { opacity: 0; }

    /* ---------- FOOTER ---------- */
    .footer {
      position: fixed; left: 50%; bottom: clamp(16px, 3vh, 30px);
      transform: translateX(-50%); z-index: 20;
      display: flex; gap: clamp(20px, 5vw, 44px);
      font-size: clamp(13px, 1.7vw, 15px);
      letter-spacing: 0.16em; text-transform: uppercase;
    }
    .footer a {
      text-decoration: none; color: var(--dove-dim);
      transition: color 0.2s ease; padding-left: 0.16em;
    }
    .footer a:hover, .footer a:focus-visible { color: var(--dove); outline: none; }
    body.title-up .footer a { color: rgba(247, 241, 226, 0.5); }
    body.title-up .footer a:hover { color: #fff; }

    @media (prefers-reduced-motion: reduce) {
      .ring-still, .menu-dove { animation: none; }
      .enter-hint { animation: none; opacity: 0.7; }
      .menu, .title { transition: opacity 0.3s ease; }
    }
  </style>
</head>
<body class="title-up">

  <!-- MENU -->
  <main class="menu" id="menu" aria-hidden="true">
    <a href="index.html" class="to-title">Title</a>
    <img class="emblem" src="emblem.png" alt="" />
    <img class="menu-dove" src="dove.png" alt="" />
    <img class="wordmark-img" src="logo-handwritten.png" alt="Your Dove Hands"
         onerror="this.style.display='none';var t=document.getElementById('wordmark-text');if(t){t.style.display='block';}" />
    <h1 class="wordmark" id="wordmark-text" style="display:none">Your Dove Hands</h1>
    <nav class="links">
      <a href="live.html">Live</a>
      <a href="demos.html">Demos</a>
      <a href="paraphernalia.html">Paraphernalia</a>
      <a href="moving-pictures.html">Moving Pictures</a>
      <a href="fly.html">Fly</a>
    </nav>
  </main>

  <!-- TITLE OVERLAY -->
  <div class="title" id="title">
    <button class="enter" id="enter" aria-label="Enter Your Dove Hands">
      <img class="ring-still" src="poster.png" alt="Your Dove Hands — a ring of doves" />
      <video class="ring-clip" id="clip" src="animation.mp4" muted playsinline preload="auto"></video>
      <span class="enter-hint">enter</span>
    </button>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="https://yourdovehands.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
    <a href="mailto:yourdovehands@gmail.com">Email</a>
  </footer>

  <script>
    (function () {
      var title = document.getElementById('title');
      var enter = document.getElementById('enter');
      var clip  = document.getElementById('clip');
      var menu  = document.getElementById('menu');
      var body  = document.body;
      var done  = false;
      var reduce = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function showMenu(instant) {
        if (done) return;
        done = true;
        body.classList.remove('title-up');
        menu.classList.add('revealed');
        menu.setAttribute('aria-hidden', 'false');
        if (instant) {
          title.style.display = 'none';
        } else {
          title.classList.add('hide');
          setTimeout(function () { title.style.display = 'none'; }, 950);
        }
      }
      function go() {
        if (enter.classList.contains('playing')) return;
        if (reduce) { showMenu(false); return; }
        enter.classList.add('playing');
        clip.addEventListener('ended', function () { showMenu(false); }, { once: true });
        var fallback = setTimeout(function () { showMenu(false); }, 1600);
        clip.addEventListener('ended', function () { clearTimeout(fallback); }, { once: true });
        var p = clip.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function () { clearTimeout(fallback); showMenu(false); });
        }
      }
      enter.addEventListener('click', go);

      // Arriving from a "Home" link lands straight on the menu, skipping the title screen.
      if (location.hash === '#menu') { showMenu(true); }
    })();
  </script>
  <script src="dovetrail.js" defer></script>
</body>
</html>
