<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demos — Your Dove Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --beige: #c7b489; --beige-deep: #b7a473;
      --dove: #f7f1e2; --dove-dim: rgba(247, 241, 226, 0.65);
      --sans: "Rubik", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: var(--sans); font-weight: 400; color: var(--dove);
      background: radial-gradient(130% 100% at 50% 30%, var(--beige) 0%, var(--beige-deep) 100%);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 14vh 5vw 12vh;
    }
    .art-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: url("poster-collage.jpg") center / cover no-repeat;
      opacity: 0.18; mix-blend-mode: multiply;
    }
    .home {
      position: fixed; top: clamp(16px, 3vh, 26px); left: clamp(18px, 4vw, 34px); z-index: 10;
      font-size: clamp(13px, 1.7vw, 15px); letter-spacing: 0.16em; text-transform: uppercase;
      text-decoration: none; color: var(--dove-dim); transition: color 0.2s ease;
    }
    .home::before { content: "\2190\00a0\00a0"; }
    .home:hover, .home:focus-visible { color: var(--dove); outline: none; }

    .page-title {
      position: relative; z-index: 2;
      font-weight: 500; font-size: clamp(30px, 6vw, 56px); letter-spacing: 0.02em;
      margin: 0 0 clamp(20px, 4vh, 34px); text-align: center;
    }
    .player {
      position: relative; z-index: 2;
      width: min(92vw, 560px);
      padding: clamp(24px, 4vw, 38px) clamp(22px, 4vw, 40px) clamp(26px, 4vw, 36px);
      border-radius: 4px;
      background: rgba(48, 40, 24, 0.28);
      border: 1px solid rgba(247, 241, 226, 0.3);
      box-shadow: 0 10px 26px rgba(38, 31, 18, 0.28);
      backdrop-filter: blur(2px);
      text-align: center;
    }
    .track-title {
      font-weight: 500; font-size: clamp(22px, 4vw, 34px); letter-spacing: 0.01em; margin: 0 0 4px;
    }
    .track-meta {
      font-size: clamp(12px, 1.9vw, 15px); letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--dove-dim); margin: 0 0 clamp(18px, 3.5vh, 28px);
    }
    audio { width: 100%; display: block; filter: saturate(0) brightness(1.02); }

    .footer {
      position: fixed; left: 50%; bottom: clamp(16px, 3vh, 30px);
      transform: translateX(-50%); z-index: 20;
      display: flex; gap: clamp(20px, 5vw, 44px);
      font-size: clamp(13px, 1.7vw, 15px); letter-spacing: 0.16em; text-transform: uppercase;
    }
    .footer a { text-decoration: none; color: var(--dove-dim); transition: color 0.2s ease; }
    .footer a:hover, .footer a:focus-visible { color: var(--dove); outline: none; }
  </style>
</head>
<body>
  <div class="art-bg"></div>
  <a href="index.html#menu" class="home">Home</a>

  <h1 class="page-title">Demos</h1>
  <div class="player">
    <p class="track-title">Heart Shotgun</p>
    <p class="track-meta">Demo</p>
    <audio controls preload="metadata">
      <source src="heartshotgun.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
  </div>

  <footer class="footer">
    <a href="https://yourdovehands.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
    <a href="mailto:yourdovehands@gmail.com">Email</a>
  </footer>

  <script src="dovetrail.js" defer></script>
</body>
</html>
